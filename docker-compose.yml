
services:

  postgres:
    image: postgres:15-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  ingest:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    command: ["python", "backend/app/ingest_qdrant.py"]   # ← путь к файлу, не модуль
    depends_on:
      qdrant:
        condition: service_started
    restart: "no"
      
  mongodb:
    image: mongo:7
    env_file: .env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/backend/app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      qdrant:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:

